<!DOCTYPE html>
<html lang="ko">
<head>

  <title>평가원 문제 검색</title>

  <link rel="stylesheet" href="style.css" />
</head>
<body>

<header>
  <a href="../../index.html" class="home">J&B LAB</a>

</header>

<main>

    <h1>문제 검색</h1>

    <div class="search-row">
      <input id="searchInput" placeholder="검색어를 입력하세요" autocomplete="off" />
      <button id="searchBtn">검색</button>
    </div>

    <div id="parsed" class="parsed"></div>
  </section>

  <section id="result" class="result hidden"></section>
</main>

<script src="app.js"></script>
</body>
</html>
