<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>문항 자동 검색</title>

<style>
*{box-sizing:border-box}
body{margin:0;background:#f3f6fa;font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;color:#222}
header{background:#1f2937;color:white;padding:18px 30px;font-size:24px;font-weight:800}
.container{max-width:1100px;margin:auto;padding:30px}
.card{background:white;border-radius:16px;padding:24px;box-shadow:0 6px 18px rgba(0,0,0,.08)}
h1{margin:0 0 12px;font-size:26px}
.desc{color:#666;line-height:1.6;margin-bottom:16px}
input{width:100%;padding:16px;font-size:18px;border:2px solid #ddd;border-radius:12px;outline:none}
input:focus{border-color:#2563eb}
button{margin-top:12px;width:100%;padding:15px;border:none;border-radius:12px;background:#2563eb;color:white;font-size:18px;font-weight:700;cursor:pointer}
button:hover{background:#1d4ed8}
#error{color:#dc2626;margin-top:15px;font-weight:700;line-height:1.6}
#result{margin-top:24px;display:none}
.info{margin-top:8px;color:#555;line-height:1.7}
.code{background:#eef2ff;padding:2px 6px;border-radius:6px;font-family:Consolas,monospace}
.preview{margin-top:20px;text-align:center}
.preview img{max-width:100%;border:1px solid #ddd;border-radius:12px;background:#fafafa}
.links{display:flex;gap:10px;flex-wrap:wrap;margin-top:20px}
.links a{text-decoration:none;padding:12px 16px;border-radius:10px;color:white;font-weight:700}
.image{background:#444}.problem{background:#2563eb}.answer{background:#16a34a}
.hidden{display:none!important}
.logo{
  width:42px;
  height:42px;
  margin-right:10px;
}

.brand{
  font-size:24px;
  font-weight:800;
}

.badge{
  margin-left:6px;
  background:#2563eb;
  color:white;
  padding:4px 8px;
  border-radius:8px;
  font-size:13px;
  font-weight:700;
}

.hero-card{
  background:white;
  border-radius:16px;
  padding:28px;
  margin-bottom:20px;
  box-shadow:0 6px 18px rgba(0,0,0,.08);
}

.hero-desc{
  color:#666;
  line-height:1.6;
}

.notice{
  margin-top:16px;
  background:#fff7ed;
  border:1px solid #fdba74;
  color:#9a3412;
  padding:14px;
  border-radius:12px;
  line-height:1.7;
}

</style>
</head>

<body>

<header>
  <a href="../../index.html" style="display:flex;align-items:center;text-decoration:none;color:inherit;">
    <img src="../../logo.png" class="logo" alt="J&B LAB">
    <div class="brand">J&B</div>
    <div class="badge">LAB</div>
  </a>
</header>

<main class="container">

  <section class="hero-card">

    <h1>문항 출처 검색기</h1>

    <p class="hero-desc">
      기출 문항의 이미지, 문제 PDF, 해설 PDF를 자동으로 검색합니다.
    </p>

    <div class="notice">
      ⚠️ 처음 검색하는 문항은 구글 드라이브 탐색으로 인해
      <strong>20~30초 정도 소요될 수 있습니다.</strong><br>
      한 번 검색된 문항은 이후 훨씬 빠르게 열립니다.
    </div>

  </section>

  <section class="card">

    <div class="desc">
      검색 예시<br><br>

      <span class="code">26 03 고2 통합과학 23번</span><br>
      <span class="code">25 04 고3 물리학Ⅰ 1번</span><br>
      <span class="code">24 11 고3 생명과학Ⅱ 17번</span>
    </div>

    <input
      id="searchInput"
      placeholder="예) 26 03 고2 통합과학 23번"
    >

    <button onclick="searchProblem()">
      검색
    </button>

    <div id="error"></div>

  </section>

  <section id="result" class="card">

    <h2 id="title"></h2>

    <div id="info" class="info"></div>

    <div class="preview">
      <img id="preview" alt="문항 미리보기">
    </div>

    <div class="links">

      <a
        id="imgBtn"
        class="image"
        target="_blank"
      >
        🖼 이미지 열기
      </a>

      <a
        id="problemBtn"
        class="problem"
        target="_blank"
      >
        📄 문제 PDF
      </a>

      <a
        id="answerBtn"
        class="answer"
        target="_blank"
      >
        📘 해설 PDF
      </a>

    </div>

  </section>

</main>

<script>
const API_URL =
"https://script.google.com/macros/s/AKfycbxq_KLfsK4qyrB13yrj9IUAJfFd6sfz6IqIDff39Ak9UN20eGaXVlfz06TAT37GQxHl/exec";

function pad(n){
  return String(n).padStart(2,"0");
}

function normalizeText(text){
  return text
    .replace(/Ⅰ/g,"1")
    .replace(/Ⅱ/g,"2")
    .replace(/\s+/g," ")
    .trim();
}

function subjectCode(subject){
  subject = subject.replace(/\s+/g,"");

  const isTwo =
    subject.includes("Ⅱ") ||
    subject.includes("2");

  if(subject.includes("통합")) return "T";
  if(subject.includes("물리")) return isTwo ? "m" : "M";
  if(subject.includes("화학")) return isTwo ? "h" : "H";
  if(subject.includes("생명")) return isTwo ? "s" : "S";
  if(subject.includes("지구")) return isTwo ? "g" : "G";

  return null;
}

function subjectPdfCode(code){
  const map = {
    M:"phy", H:"che", S:"bio", G:"ear",
    m:"phy", h:"che", s:"bio", g:"ear"
  };

  return map[code] || null;
}

async function findFile(filename){
  const res = await fetch(
    API_URL + "?filename=" + encodeURIComponent(filename)
  );

  return await res.json();
}

async function findFirstFile(candidates){

  for(const name of candidates){

    const found = await findFile(name);

    if(found.ok){
      found.matchedName = name;
      return found;
    }
  }

  return {
    ok:false,
    tried:candidates
  };
}

function parseQuery(text){

  const raw = text.trim();

  const q = normalizeText(raw);

  const m = q.match(
    /(\d{2})\s*(\d{1,2})\s*고\s*([123])\s*(.+?)\s*(\d{1,2})\s*번?/
  );

  if(!m) return null;

  const yy = Number(m[1]);
  const mm = Number(m[2]);
  const grade = Number(m[3]);
  const subject = m[4];
  const no = Number(m[5]);

  const code = subjectCode(subject);

  if(!code) return null;

  return {
    raw,
    yy,
    mm,
    grade,
    subject,
    no,
    code
  };
}

function buildNames(data){

  const base =
    data.grade +
    data.code +
    pad(data.yy) +
    pad(data.mm);

  const imageCandidates = [
    base + pad(data.no) + ".png",
    base + pad(data.no) + ".PNG"
  ];

  let problemCandidates = [];
  let answerCandidates = [];

  if(data.grade === 2 && data.code !== "T"){

    const pdfCode = subjectPdfCode(data.code);

    problemCandidates = [
      base + "g_" + pdfCode + "_mun.pdf",
      base + ".pdf"
    ];

    answerCandidates = [
      base + "g_" + pdfCode + "_hsj.pdf",
      base + " 해설.pdf",
      base + "해설.pdf"
    ];

  }else{

    problemCandidates = [
      base + ".pdf"
    ];

    answerCandidates = [
      base + " 해설.pdf",
      base + "해설.pdf",
      base + "_hsj.pdf"
    ];
  }

  return {
    imageCandidates,
    problemCandidates,
    answerCandidates
  };
}

async function searchProblem(){

  const error = document.getElementById("error");
  const result = document.getElementById("result");

  error.innerHTML = "";
  result.style.display = "none";

  const text =
    document.getElementById("searchInput").value.trim();

  const data = parseQuery(text);

  if(!data){
    error.innerHTML =
      "검색 형식 예시 : 26 03 고2 통합과학 23번";
    return;
  }

  const names = buildNames(data);

  error.innerHTML =
    "🔍 검색 중입니다. 처음 검색은 20~30초 정도 걸릴 수 있습니다.";

  try{

    const img =
      await findFirstFile(names.imageCandidates);

    if(!img.ok){

      error.innerHTML =
        "이미지를 찾지 못했습니다.<br>" +
        names.imageCandidates.join("<br>");

      return;
    }

    const problem =
      await findFirstFile(names.problemCandidates);

    const answer =
      await findFirstFile(names.answerCandidates);

    document.getElementById("title").innerHTML =
      data.raw;

    document.getElementById("preview").src =
      img.directView;

    document.getElementById("imgBtn").href =
      img.driveView;

    if(problem.ok){
      document.getElementById("problemBtn").href =
        problem.driveView;
    }

    if(answer.ok){
      document.getElementById("answerBtn").href =
        answer.driveView;
    }

    document.getElementById("info").innerHTML =
      `찾은 이미지 : <span class="code">${img.filename}</span><br>
       문제 PDF : <span class="code">${problem.ok ? problem.filename : "없음"}</span><br>
       해설 PDF : <span class="code">${answer.ok ? answer.filename : "없음"}</span>`;

    error.innerHTML = "";
    result.style.display = "block";

  }catch(e){

    error.innerHTML =
      "Apps Script 연결 실패";

    console.error(e);
  }
}

document
.getElementById("searchInput")
.addEventListener("keydown", function(e){

  if(e.key === "Enter"){
    searchProblem();
  }

});
</script>

</body>
</html>
