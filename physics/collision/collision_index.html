<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>1차원 충돌 실험 시뮬레이터</title>
<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f4f7fb;
  color:#111827;
}
header{
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:800;
  line-height:1.45;
}
.container{
  max-width:1180px;
  margin:0 auto;
  padding:10px;
}
.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
.object-grid{
  display:grid;
  grid-template-columns:repeat(3,1fr);
  gap:8px;
}
label{
  font-size:12px;
  font-weight:700;
  color:#374151;
}
input,select,button{
  width:100%;
  min-height:36px;
  padding:6px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}
button{
  border:none;
  background:#2563eb;
  color:white;
  font-weight:800;
  cursor:pointer;
}
button:hover{filter:brightness(.95)}
button.secondary{background:#475569}
button.green{background:#15803d}
button.orange{background:#f97316}
button.red{background:#dc2626}
.status{
  padding:10px;
  border-radius:10px;
  font-weight:800;
  text-align:center;
  margin-bottom:8px;
  background:#dcfce7;
  color:#166534;
}
.small{
  font-size:12px;
  color:#6b7280;
  line-height:1.5;
  margin-top:6px;
}
.home{
  display:inline-block;
  color:white;
  text-decoration:none;
  font-size:13px;
  margin-top:6px;
  opacity:.8;
}
.canvas-wrap{
  width:100%;
  overflow:auto;
}
canvas{
  width:100%;
  max-width:100%;
  background:white;
  border:1px solid #e5e7eb;
  border-radius:12px;
  touch-action:none;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  border:1px solid #d1d5db;
  padding:6px;
  text-align:center;
}
th{background:#f3f4f6}
.log{
  height:150px;
  overflow:auto;
  white-space:pre-line;
  border:1px solid #d1d5db;
  border-radius:10px;
  padding:8px;
  font-size:12px;
  background:#f8fafc;
}
.badge{
  display:inline-block;
  padding:3px 8px;
  border-radius:999px;
  background:#e0f2fe;
  color:#075985;
  font-size:12px;
  font-weight:800;
}
@media(max-width:720px){
  .grid,.object-grid{grid-template-columns:1fr 1fr}
  canvas{height:520px}
}
</style>
</head>
<body>
<header>
  1차원 충돌 실험 시뮬레이터<br>
  <a class="home" href="../../index.html">← J&B LAB 홈으로</a>
</header>

<div class="container">
  <div class="card grid">
    <div>
      <label>물체 개수</label>
      <select id="objectCount" onchange="refreshObjects()">
        <option value="2">2개</option>
        <option value="3" selected>3개</option>
      </select>
    </div>
    <div>
      <label>반발계수 e</label>
      <input id="restitution" type="number" value="1" min="0" max="1" step="0.1">
    </div>
    <div>
      <label>전체 시간 s</label>
      <input id="totalTime" type="number" value="10" min="0.1" step="0.5">
    </div>
    <div>
      <label>시간 간격 dt</label>
      <input id="dt" type="number" value="0.005" min="0.001" step="0.001">
    </div>
  </div>

  <div class="card grid">
    <button onclick="setE(1)">탄성 충돌 e=1</button>
    <button onclick="setE(0)">완전 비탄성 e=0</button>
  </div>

  <div class="card">
    <div class="small">초기 위치는 공을 직접 드래그해도 됩니다.</div>
    <div id="objectInputs" class="object-grid"></div>
  </div>

  <div class="card grid">
    <button class="green" onclick="runSimulation()">▶ 계산 후 영상 재생</button>
    <button class="secondary" onclick="togglePlay()">⏸ 일시정지 / 재생</button>
    <button class="orange" onclick="resetAnimation()">처음부터 재생</button>
    <button class="secondary" onclick="drawInitial()">초기 배치 보기</button>
    <button class="secondary" onclick="toggleGrid()">격자 보기 / 숨기기</button>
    <button class="red" onclick="stopAnimation()">정지</button>
  </div>

  <div class="card">
    <div id="status" class="status">초기 배치 화면</div>
    <div class="canvas-wrap">
      <canvas id="simCanvas" width="1100" height="720"></canvas>
    </div>
    <div class="small">
      위 그래프: 1차원 위치 / 가운데: 시간에 따른 운동량 / 아래: 시간에 따른 운동에너지
    </div>
  </div>

  <div class="card">
    <div class="badge">실시간 운동량</div>
    <table style="margin-top:8px">
      <thead>
        <tr><th>구분</th><th>위치 m</th><th>속도 m/s</th><th>운동량 kg·m/s</th><th>운동에너지 J</th></tr>
      </thead>
      <tbody id="liveTable"></tbody>
    </table>
  </div>

  <div class="card">
    <div class="badge">충돌 로그</div>
    <div id="logBox" class="log">아직 실행 전입니다.</div>
  </div>
</div>

<script>
const canvas = document.getElementById("simCanvas");
const ctx = canvas.getContext("2d");
const colors = ["#2563eb", "#f97316", "#16a34a"];
const xMin = 0;
const xMax = 10;
let showGrid = true;
let objects = [];
let simData = null;
let currentFrame = 0;
let playing = false;
let rafId = null;
let draggingIndex = null;
let lastTick = 0;

function fmt(x){
  if(!isFinite(x)) return "-";
  if(Math.abs(x) < 1e-10) return "0";
  return Number(x).toFixed(3).replace(/\.?0+$/, "");
}

function setE(v){
  document.getElementById("restitution").value = v;
}

function defaultObjects(){
  return [
    {m:1, x:2.0, v:2.0},
    {m:1, x:5.5, v:0.0},
    {m:1, x:8.0, v:-1.0}
  ];
}

function refreshObjects(){
  const n = Number(document.getElementById("objectCount").value);
  const old = objects.length ? readObjects(false) : defaultObjects();
  objects = defaultObjects().slice(0,n).map((d,i)=> old[i] || d);
  renderObjectInputs();
  drawInitial();
}

function renderObjectInputs(){
  const box = document.getElementById("objectInputs");
  box.innerHTML = "";
  objects.forEach((o,i)=>{
    const div = document.createElement("div");
    div.className = "card";
    div.style.boxShadow = "none";
    div.style.border = "1px solid #e5e7eb";
    div.innerHTML = `
      <div style="font-weight:800;margin-bottom:6px;color:${colors[i]}">물체 ${i+1}</div>
      <label>질량 kg</label>
      <input id="m${i}" type="number" value="${o.m}" min="0.1" step="0.1" oninput="drawInitial()">
      <label>초기 위치 m</label>
      <input id="x${i}" type="number" value="${o.x}" min="0" max="10" step="0.1" oninput="drawInitial()">
      <label>초기 속도 m/s</label>
      <input id="v${i}" type="number" value="${o.v}" step="0.1" oninput="drawInitial()">
    `;
    box.appendChild(div);
  });
}

function readObjects(throwError=true){
  const n = Number(document.getElementById("objectCount").value);
  const arr = [];
  for(let i=0;i<n;i++){
    const m = Number(document.getElementById(`m${i}`)?.value ?? defaultObjects()[i].m);
    const x = Number(document.getElementById(`x${i}`)?.value ?? defaultObjects()[i].x);
    const v = Number(document.getElementById(`v${i}`)?.value ?? defaultObjects()[i].v);
    if(throwError && (!isFinite(m) || !isFinite(x) || !isFinite(v) || m <= 0)){
      alert("질량은 0보다 커야 하고, 위치와 속도는 숫자여야 합니다.");
      throw new Error("input error");
    }
    arr.push({m,x:Math.max(xMin,Math.min(xMax,x)),v});
  }
  return arr;
}

function getRadius(m){
  return 0.12 + 0.08 * Math.sqrt(m);
}

function mapX(x){
  const left = 70, right = canvas.width - 35;
  return left + (x - xMin) / (xMax - xMin) * (right - left);
}

function graphY(y, min, max, top, bottom){
  if(Math.abs(max-min) < 1e-9) return (top+bottom)/2;
  return bottom - (y-min)/(max-min)*(bottom-top);
}

function drawGrid(top,bottom,yMin,yMax){
  if(!showGrid) return;
  ctx.strokeStyle = "#e5e7eb";
  ctx.lineWidth = 1;
  for(let i=0;i<=10;i++){
    const x = mapX(i);
    ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bottom); ctx.stroke();
  }
  for(let i=0;i<=4;i++){
    const y = top + (bottom-top)*i/4;
    ctx.beginPath(); ctx.moveTo(70,y); ctx.lineTo(canvas.width-35,y); ctx.stroke();
  }
  ctx.fillStyle = "#64748b";
  ctx.font = "12px sans-serif";
  ctx.fillText(fmt(yMax), 10, top+12);
  ctx.fillText(fmt(yMin), 10, bottom-4);
}

function clearCanvas(){
  ctx.clearRect(0,0,canvas.width,canvas.height);
  ctx.fillStyle = "#ffffff";
  ctx.fillRect(0,0,canvas.width,canvas.height);
}

function drawInitial(){
  stopAnimation(false);
  simData = null;
  objects = readObjects(false);
  clearCanvas();
  drawTitle("초기 배치 화면 - 공을 마우스로 드래그하세요", 20);
  drawMotionPanel(objects, null, 45, 215, 0, false);
  drawEmptyGraph("운동량 그래프", "시간 s", "운동량 kg·m/s", 250, 455);
  drawEmptyGraph("운동에너지 그래프", "시간 s", "운동에너지 J", 500, 705);
  document.getElementById("status").textContent = "초기 배치 화면";
  updateLiveTable(objects, null);
}

function drawTitle(text,y){
  ctx.fillStyle = "#111827";
  ctx.font = "bold 18px sans-serif";
  ctx.fillText(text, 70, y);
}

function drawMotionPanel(objs, frameData, top, bottom, t, isRunning){
  drawGrid(top,bottom,-1,1);
  const axisY = (top+bottom)/2;
  ctx.strokeStyle = "#111827";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(70,axisY); ctx.lineTo(canvas.width-35,axisY); ctx.stroke();
  ctx.fillStyle = "#374151";
  ctx.font = "12px sans-serif";
  for(let i=0;i<=10;i++) ctx.fillText(String(i), mapX(i)-4, bottom+16);
  ctx.fillText("위치 m", canvas.width-90, bottom+16);

  objs.forEach((o,i)=>{
    const x = frameData ? frameData.positions[i] : o.x;
    const p = frameData ? frameData.momenta[i] : o.m * o.v;
    const r = 20 + 8*Math.sqrt(o.m);
    ctx.beginPath();
    ctx.arc(mapX(x), axisY, r, 0, Math.PI*2);
    ctx.fillStyle = colors[i];
    ctx.fill();
    ctx.strokeStyle = "#111827";
    ctx.lineWidth = 2;
    ctx.stroke();
    ctx.fillStyle = "#111827";
    ctx.font = "bold 13px sans-serif";
    ctx.textAlign = "center";
    ctx.fillText(`물체 ${i+1}`, mapX(x), axisY-38);
    ctx.fillStyle = colors[i];
    ctx.fillText(`p=${fmt(p)}`, mapX(x), axisY+48);
    ctx.textAlign = "left";
  });
  if(isRunning){
    ctx.fillStyle = "#111827";
    ctx.font = "bold 15px sans-serif";
    ctx.fillText(`실시간 충돌 영상  t = ${fmt(t)} s`, 70, top-12);
  }
}

function drawEmptyGraph(title, xlabel, ylabel, top, bottom){
  drawGrid(top,bottom,-1,1);
  ctx.strokeStyle = "#111827";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(70,top,canvas.width-105,bottom-top);
  ctx.fillStyle = "#111827";
  ctx.font = "bold 15px sans-serif";
  ctx.fillText(title, 70, top-10);
  ctx.font = "12px sans-serif";
  ctx.fillText(xlabel, canvas.width-95, bottom+18);
  ctx.save(); ctx.translate(22,(top+bottom)/2); ctx.rotate(-Math.PI/2); ctx.fillText(ylabel,0,0); ctx.restore();
}

function getRange(arrays){
  const values = arrays.flat().filter(Number.isFinite);
  let min = Math.min(...values), max = Math.max(...values);
  if(!isFinite(min) || !isFinite(max)){min=-1;max=1;}
  if(Math.abs(max-min)<1e-9){min-=1;max+=1;}
  const pad = (max-min)*0.12;
  return [min-pad,max+pad];
}

function drawLineGraph(title, ylabel, top, bottom, times, series, total, frame, collisionTimes){
  const [yMin,yMax] = getRange([...series,total]);
  drawGrid(top,bottom,yMin,yMax);
  ctx.strokeStyle = "#111827";
  ctx.lineWidth = 1.5;
  ctx.strokeRect(70,top,canvas.width-105,bottom-top);
  ctx.fillStyle = "#111827";
  ctx.font = "bold 15px sans-serif";
  ctx.fillText(title, 70, top-10);
  ctx.font = "12px sans-serif";
  ctx.fillText("시간 s", canvas.width-95, bottom+18);
  ctx.save(); ctx.translate(22,(top+bottom)/2); ctx.rotate(-Math.PI/2); ctx.fillText(ylabel,0,0); ctx.restore();

  const xLeft=70, xRight=canvas.width-35;
  const tMax = times[times.length-1] || 1;
  const tx = t => xLeft + t/tMax*(xRight-xLeft);

  collisionTimes.forEach(ct=>{
    const x = tx(ct);
    ctx.strokeStyle = "#ef4444";
    ctx.setLineDash([3,4]);
    ctx.beginPath(); ctx.moveTo(x,top); ctx.lineTo(x,bottom); ctx.stroke();
    ctx.setLineDash([]);
  });

  series.forEach((ys,i)=> drawSeries(times,ys,tx,y=>graphY(y,yMin,yMax,top,bottom),colors[i],false));
  drawSeries(times,total,tx,y=>graphY(y,yMin,yMax,top,bottom),"#111827",true);

  const curX = tx(times[frame]);
  ctx.strokeStyle = "#7c3aed";
  ctx.lineWidth = 2;
  ctx.beginPath(); ctx.moveTo(curX,top); ctx.lineTo(curX,bottom); ctx.stroke();
}

function drawSeries(times, ys, tx, ty, color, dashed){
  ctx.strokeStyle = color;
  ctx.lineWidth = dashed ? 2.2 : 1.8;
  ctx.setLineDash(dashed ? [7,5] : []);
  ctx.beginPath();
  for(let i=0;i<times.length;i++){
    const x = tx(times[i]);
    const y = ty(ys[i]);
    if(i===0) ctx.moveTo(x,y); else ctx.lineTo(x,y);
  }
  ctx.stroke();
  ctx.setLineDash([]);
}

function runSimulation(){
  const e = Number(document.getElementById("restitution").value);
  const totalTime = Number(document.getElementById("totalTime").value);
  const dt = Number(document.getElementById("dt").value);
  if(e < 0 || e > 1 || totalTime <= 0 || dt <= 0){
    alert("반발계수는 0~1, 시간 값은 0보다 크게 입력해야 합니다.");
    return;
  }
  objects = readObjects(true);
  const n = objects.length;
  let positions = objects.map(o=>o.x);
  let velocities = objects.map(o=>o.v);
  const masses = objects.map(o=>o.m);
  const radii = masses.map(getRadius);
  const times = [];
  const posHistory = [];
  const velHistory = [];
  const momentumHistory = [];
  const energyHistory = [];
  const collisions = [];

  const steps = Math.min(20000, Math.floor(totalTime/dt));
  for(let step=0; step<=steps; step++){
    const t = step*dt;
    positions = positions.map((x,i)=> x + velocities[i]*dt);

    for(let i=0;i<n;i++){
      if(positions[i] - radii[i] < xMin){
        positions[i] = xMin + radii[i];
        velocities[i] *= -1;
      }
      if(positions[i] + radii[i] > xMax){
        positions[i] = xMax - radii[i];
        velocities[i] *= -1;
      }
    }

    for(let i=0;i<n;i++){
      for(let j=i+1;j<n;j++){
        const minDist = radii[i]+radii[j];
        const dist = Math.abs(positions[i]-positions[j]);
        const approaching = (positions[i] < positions[j] && velocities[i] > velocities[j]) ||
                            (positions[i] > positions[j] && velocities[i] < velocities[j]);
        if(dist <= minDist && approaching){
          const before1 = velocities[i], before2 = velocities[j];
          const m1=masses[i], m2=masses[j], u1=velocities[i], u2=velocities[j];
          const v1 = ((m1 - e*m2)*u1 + (1+e)*m2*u2)/(m1+m2);
          const v2 = ((m2 - e*m1)*u2 + (1+e)*m1*u1)/(m1+m2);
          velocities[i] = v1; velocities[j] = v2;
          const cx = (positions[i]+positions[j])/2;
          collisions.push({time:t,x:cx,objects:[i+1,j+1],before:[before1,before2],after:[v1,v2]});
          const overlap = minDist-dist;
          if(overlap > 0){
            const correction = overlap/2 + 0.001;
            if(positions[i] < positions[j]){positions[i]-=correction; positions[j]+=correction;}
            else{positions[i]+=correction; positions[j]-=correction;}
          }
        }
      }
    }

    times.push(t);
    posHistory.push([...positions]);
    velHistory.push([...velocities]);
    momentumHistory.push(velocities.map((v,i)=>masses[i]*v));
    energyHistory.push(velocities.map((v,i)=>0.5*masses[i]*v*v));
  }

  const totalMomentum = momentumHistory.map(row=>row.reduce((a,b)=>a+b,0));
  const totalEnergy = energyHistory.map(row=>row.reduce((a,b)=>a+b,0));
  simData = {times,posHistory,velHistory,momentumHistory,energyHistory,totalMomentum,totalEnergy,collisions,masses};
  currentFrame = 0;
  writeLog(collisions);
  playing = true;
  lastTick = 0;
  document.getElementById("status").textContent = "시뮬레이션 재생 중";
  animate();
}

function drawFrame(){
  if(!simData){drawInitial(); return;}
  clearCanvas();
  const t = simData.times[currentFrame];
  const frameData = {
    positions: simData.posHistory[currentFrame],
    velocities: simData.velHistory[currentFrame],
    momenta: simData.momentumHistory[currentFrame],
    energies: simData.energyHistory[currentFrame]
  };
  drawMotionPanel(objects, frameData, 45, 215, t, true);
  const seriesP = transpose(simData.momentumHistory);
  const seriesE = transpose(simData.energyHistory);
  const cTimes = simData.collisions.map(c=>c.time);
  drawLineGraph("시간에 따른 운동량 변화", "운동량 kg·m/s", 250, 455, simData.times, seriesP, simData.totalMomentum, currentFrame, cTimes);
  drawLineGraph("시간에 따른 운동에너지 변화", "운동에너지 J", 500, 705, simData.times, seriesE, simData.totalEnergy, currentFrame, cTimes);
  updateLiveTable(objects, frameData);
}

function transpose(rows){
  if(!rows.length) return [];
  return rows[0].map((_,i)=>rows.map(r=>r[i]));
}

function animate(ts=0){
  if(!playing || !simData) return;
  if(!lastTick || ts-lastTick > 20){
    const total = simData.times.length;
    const frameStep = Math.max(1, Math.floor(total/500));
    currentFrame += frameStep;
    if(currentFrame >= total){
      currentFrame = total-1;
      playing = false;
      document.getElementById("status").textContent = "재생 완료";
    }
    drawFrame();
    lastTick = ts;
  }
  rafId = requestAnimationFrame(animate);
}

function togglePlay(){
  if(!simData) return;
  playing = !playing;
  document.getElementById("status").textContent = playing ? "시뮬레이션 재생 중" : "일시정지";
  if(playing){ lastTick = 0; animate(); }
}

function resetAnimation(){
  if(!simData) return;
  currentFrame = 0;
  playing = true;
  lastTick = 0;
  document.getElementById("status").textContent = "처음부터 재생";
  animate();
}

function stopAnimation(update=true){
  playing = false;
  if(rafId) cancelAnimationFrame(rafId);
  rafId = null;
  if(update) document.getElementById("status").textContent = "정지";
}

function toggleGrid(){
  showGrid = !showGrid;
  if(simData) drawFrame(); else drawInitial();
}

function updateLiveTable(objs, frameData){
  const rows = objs.map((o,i)=>{
    const x = frameData ? frameData.positions[i] : o.x;
    const v = frameData ? frameData.velocities[i] : o.v;
    const p = frameData ? frameData.momenta[i] : o.m*o.v;
    const ke = frameData ? frameData.energies[i] : 0.5*o.m*o.v*o.v;
    return `<tr><td>물체 ${i+1}</td><td>${fmt(x)}</td><td>${fmt(v)}</td><td>${fmt(p)}</td><td>${fmt(ke)}</td></tr>`;
  });
  if(frameData){
    const totalP = frameData.momenta.reduce((a,b)=>a+b,0);
    const totalE = frameData.energies.reduce((a,b)=>a+b,0);
    rows.push(`<tr><td>전체</td><td>-</td><td>-</td><td>${fmt(totalP)}</td><td>${fmt(totalE)}</td></tr>`);
  }
  document.getElementById("liveTable").innerHTML = rows.join("");
}

function writeLog(collisions){
  const box = document.getElementById("logBox");
  if(!collisions.length){
    box.textContent = "충돌 없음";
    return;
  }
  box.textContent = collisions.map(c=>{
    const [o1,o2] = c.objects;
    return `${fmt(c.time)}s, x=${fmt(c.x)}m\n물체 ${o1} ↔ 물체 ${o2}\n충돌 전: ${fmt(c.before[0])}, ${fmt(c.before[1])} m/s\n충돌 후: ${fmt(c.after[0])}, ${fmt(c.after[1])} m/s\n----------------------`;
  }).join("\n");
}

function canvasToDataX(clientX){
  const rect = canvas.getBoundingClientRect();
  const px = (clientX - rect.left) * canvas.width / rect.width;
  const left = 70, right = canvas.width - 35;
  return xMin + (px-left)/(right-left)*(xMax-xMin);
}

function pointerDown(e){
  if(simData) return;
  const rect = canvas.getBoundingClientRect();
  const y = (e.clientY - rect.top) * canvas.height / rect.height;
  if(y < 45 || y > 215) return;
  const xData = canvasToDataX(e.clientX);
  objects = readObjects(false);
  let best = 0, bestD = Infinity;
  objects.forEach((o,i)=>{
    const d = Math.abs(o.x - xData);
    if(d < bestD){ bestD=d; best=i; }
  });
  if(bestD < 0.45){
    draggingIndex = best;
    canvas.setPointerCapture(e.pointerId);
  }
}

function pointerMove(e){
  if(draggingIndex === null) return;
  const x = Math.max(xMin, Math.min(xMax, canvasToDataX(e.clientX)));
  document.getElementById(`x${draggingIndex}`).value = x.toFixed(2);
  objects[draggingIndex].x = x;
  drawInitial();
}

function pointerUp(e){
  draggingIndex = null;
}

canvas.addEventListener("pointerdown", pointerDown);
canvas.addEventListener("pointermove", pointerMove);
canvas.addEventListener("pointerup", pointerUp);
canvas.addEventListener("pointercancel", pointerUp);

refreshObjects();
</script>
</body>
</html>
