<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>중화 반응 시뮬레이터</title>

<style>
*{box-sizing:border-box}
body{
  margin:0;
  font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif;
  background:#f4f7fb;
  color:#111827;
}
header{
  background:linear-gradient(135deg,#0f172a,#1e3a8a);
  color:white;
  padding:14px;
  text-align:center;
  font-weight:800;
}
.container{
  max-width:980px;
  margin:0 auto;
  padding:10px;
}
.card{
  background:white;
  border-radius:14px;
  padding:12px;
  margin-bottom:10px;
  box-shadow:0 3px 12px rgba(0,0,0,.08);
}
.grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:8px;
}
label{
  font-size:12px;
  font-weight:700;
  color:#374151;
}
input,select,button{
  width:100%;
  min-height:36px;
  padding:6px;
  border-radius:8px;
  border:1px solid #d1d5db;
  font-size:14px;
}
button{
  border:none;
  background:#2563eb;
  color:white;
  font-weight:800;
}
.status{
  padding:10px;
  border-radius:10px;
  font-weight:800;
  text-align:center;
  margin-bottom:8px;
}
.acid{background:#fee2e2;color:#991b1b}
.neutral{background:#dcfce7;color:#166534}
.base{background:#dbeafe;color:#1e40af}
.beaker{
  height:210px;
  border:5px solid #374151;
  border-top:none;
  border-radius:0 0 28px 28px;
  position:relative;
  overflow:hidden;
  background:#e0f2fe;
}
.solution{
  position:absolute;
  left:0;
  right:0;
  bottom:0;
  height:78%;
  background:#86efac;
  opacity:.9;
}
.ion{
  position:absolute;
  width:34px;
  height:34px;
  border-radius:50%;
  display:flex;
  justify-content:center;
  align-items:center;
  font-size:12px;
  font-weight:800;
  color:white;
}
.hion{background:#ef4444}
.ohion{background:#3b82f6}
.salt{background:#64748b}
.water{background:#06b6d4}
.result{
  white-space:pre-line;
  line-height:1.6;
  font-size:14px;
}
table{
  width:100%;
  border-collapse:collapse;
  font-size:12px;
}
th,td{
  border:1px solid #d1d5db;
  padding:6px;
  text-align:center;
}
th{background:#f3f4f6}
.small{
  font-size:12px;
  color:#6b7280;
  line-height:1.5;
  margin-top:6px;
}
.home{
  display:inline-block;
  color:white;
  text-decoration:none;
  font-size:13px;
  margin-top:6px;
  opacity:.8;
}
@media(max-width:520px){
  .grid{grid-template-columns:1fr 1fr}
  .beaker{height:190px}
  input,select{font-size:13px}
}
</style>
</head>

<body>

<header>
  중화 반응 시뮬레이터<br>
  <a class="home" href="../../index.html">← J&B LAB 홈으로</a>
</header>

<div class="container">

  <div class="card grid">

    <div>
      <label>산 종류</label>
      <select id="acidValence">
        <option value="1">1가산 HA</option>
        <option value="2">2가산 H₂A</option>
        <option value="3">3가산 H₃A</option>
      </select>
    </div>

    <div>
      <label>염기 종류</label>
      <select id="baseValence">
        <option value="1">1가염기 BOH</option>
        <option value="2">2가염기 B(OH)₂</option>
        <option value="3">3가염기 B(OH)₃</option>
      </select>
    </div>

    <div>
      <label>산 농도 mol/L</label>
      <input id="acidM" type="number" value="1.0" step="0.1">
    </div>

    <div>
      <label>염기 농도 mol/L</label>
      <input id="baseM" type="number" value="1.0" step="0.1">
    </div>

    <div>
      <label>산 부피 mL</label>
      <input id="acidV" type="number" value="50" step="1">
    </div>

    <div>
      <label>염기 부피 mL</label>
      <input id="baseV" type="number" value="50" step="1">
    </div>

    <div>
      <label>초기 온도 ℃</label>
      <input id="temp0" type="number" value="25" step="0.1">
    </div>

    <div>
      <label>비열 J/g℃</label>
      <input id="specificHeat" type="number" value="4.18" step="0.01">
    </div>

  </div>

  <div class="card">
    <button onclick="calculate()">계산하기</button>
  </div>

  <div class="card">
    <div id="status" class="status neutral">계산 전</div>

    <div class="beaker">
      <div id="solution" class="solution"></div>
      <div id="ions"></div>
    </div>

    <div class="small">
      빨강: H⁺, 파랑: OH⁻, 회색: 구경꾼 이온, 청록: 생성된 물
    </div>
  </div>

  <div class="card result" id="resultText">아직 계산 전입니다.</div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>항목</th>
          <th>값</th>
        </tr>
      </thead>
      <tbody id="summaryTable"></tbody>
    </table>
  </div>

  <div class="card">
    <table>
      <thead>
        <tr>
          <th>이온</th>
          <th>몰수 mol</th>
          <th>입자수 비례값</th>
          <th>상태</th>
        </tr>
      </thead>
      <tbody id="ionTable"></tbody>
    </table>
  </div>

</div>

<script>
function fmt(x){
  if(Math.abs(x) < 1e-10) return "0";
  return Number(x).toFixed(4).replace(/\.?0+$/,"");
}

function calculate(){
  const aVal = Number(document.getElementById("acidValence").value);
  const bVal = Number(document.getElementById("baseValence").value);

  const acidM = Number(document.getElementById("acidM").value);
  const baseM = Number(document.getElementById("baseM").value);

  const acidV = Number(document.getElementById("acidV").value);
  const baseV = Number(document.getElementById("baseV").value);

  const temp0 = Number(document.getElementById("temp0").value);
  const c = Number(document.getElementById("specificHeat").value);

  if(acidM<=0 || baseM<=0 || acidV<=0 || baseV<=0 || c<=0){
    alert("농도, 부피, 비열은 0보다 커야 합니다.");
    return;
  }

  const acidMol = acidM * acidV / 1000;
  const baseMol = baseM * baseV / 1000;

  const hMol = acidMol * aVal;
  const ohMol = baseMol * bVal;

  const neutralizedMol = Math.min(hMol, ohMol);
  const remainH = Math.max(0, hMol - ohMol);
  const remainOH = Math.max(0, ohMol - hMol);

  const waterMol = neutralizedMol;

  const spectatorFromAcid = acidMol;
  const spectatorFromBase = baseMol;

  const totalIonMol = remainH + remainOH + spectatorFromAcid + spectatorFromBase;

  const totalVolumeL = (acidV + baseV) / 1000;

  let pH;
  if(remainH > 0){
    const hConc = remainH / totalVolumeL;
    pH = -Math.log10(hConc);
  } else if(remainOH > 0){
    const ohConc = remainOH / totalVolumeL;
    const pOH = -Math.log10(ohConc);
    pH = 14 - pOH;
  } else {
    pH = 7;
  }

  const heatJ = waterMol * 57300;
  const massG = acidV + baseV;
  const deltaT = heatJ / (massG * c);
  const finalTemp = temp0 + deltaT;

  const neutralBaseVolume = (hMol / bVal) / baseM * 1000;

  let state, cls, color;
  if(remainH > 1e-9){
    state = "산 과잉";
    cls = "status acid";
    color = "#fecaca";
  } else if(remainOH > 1e-9){
    state = "염기 과잉";
    cls = "status base";
    color = "#bfdbfe";
  } else {
    state = "중화점";
    cls = "status neutral";
    color = "#86efac";
  }

  document.getElementById("status").className = cls;
  document.getElementById("status").textContent = state;
  document.getElementById("solution").style.background = color;

  document.getElementById("resultText").textContent =
`산이 내놓을 수 있는 H⁺ 몰수 = ${fmt(hMol)} mol
염기가 내놓을 수 있는 OH⁻ 몰수 = ${fmt(ohMol)} mol

중화된 H⁺와 OH⁻ = ${fmt(neutralizedMol)} mol
생성된 물 H₂O = ${fmt(waterMol)} mol

상태 = ${state}
pH ≈ ${pH.toFixed(2)}

중화점에 필요한 염기 부피 = ${fmt(neutralBaseVolume)} mL

발생한 열량 = ${fmt(heatJ)} J
온도 상승 ΔT = ${deltaT.toFixed(2)} ℃
최종 온도 = ${finalTemp.toFixed(2)} ℃`;

  makeSummaryTable({
    acidMol, baseMol, hMol, ohMol, neutralizedMol,
    waterMol, remainH, remainOH, totalIonMol,
    pH, deltaT, finalTemp, neutralBaseVolume
  });

  makeIonTable({
    remainH, remainOH,
    spectatorFromAcid,
    spectatorFromBase,
    totalIonMol
  });

  drawIons({
    remainH, remainOH,
    spectatorFromAcid,
    spectatorFromBase,
    waterMol
  });
}

function makeSummaryTable(d){
  const rows = [
    ["산 분자 몰수", fmt(d.acidMol)+" mol"],
    ["염기 분자 몰수", fmt(d.baseMol)+" mol"],
    ["전체 H⁺ 몰수", fmt(d.hMol)+" mol"],
    ["전체 OH⁻ 몰수", fmt(d.ohMol)+" mol"],
    ["중화된 이온쌍", fmt(d.neutralizedMol)+" mol"],
    ["생성된 물", fmt(d.waterMol)+" mol"],
    ["남은 H⁺", fmt(d.remainH)+" mol"],
    ["남은 OH⁻", fmt(d.remainOH)+" mol"],
    ["혼합 용액 총 이온수 비례값", fmt(d.totalIonMol)+" mol"],
    ["pH", d.pH.toFixed(2)],
    ["중화점 염기 부피", fmt(d.neutralBaseVolume)+" mL"],
    ["온도 상승", d.deltaT.toFixed(2)+" ℃"],
    ["최종 온도", d.finalTemp.toFixed(2)+" ℃"]
  ];

  document.getElementById("summaryTable").innerHTML =
    rows.map(r=>`<tr><td>${r[0]}</td><td>${r[1]}</td></tr>`).join("");
}

function makeIonTable(d){
  const rows = [
    ["H⁺", d.remainH, "산 과잉일 때 남음"],
    ["OH⁻", d.remainOH, "염기 과잉일 때 남음"],
    ["산의 음이온 Aⁿ⁻", d.spectatorFromAcid, "구경꾼 이온"],
    ["염기의 양이온 Bⁿ⁺", d.spectatorFromBase, "구경꾼 이온"],
    ["총 이온수", d.totalIonMol, "혼합 후 용액 속 이온 총량"]
  ];

  document.getElementById("ionTable").innerHTML =
    rows.map(r=>`
      <tr>
        <td>${r[0]}</td>
        <td>${fmt(r[1])}</td>
        <td>${fmt(r[1])}</td>
        <td>${r[2]}</td>
      </tr>
    `).join("");
}

function drawIons(d){
  const box = document.getElementById("ions");
  box.innerHTML = "";

  const items = [];
  const scale = 150;

  const hCount = Math.min(12, Math.round(d.remainH * scale));
  const ohCount = Math.min(12, Math.round(d.remainOH * scale));
  const acidIonCount = Math.min(12, Math.round(d.spectatorFromAcid * scale));
  const baseIonCount = Math.min(12, Math.round(d.spectatorFromBase * scale));
  const waterCount = Math.min(14, Math.round(d.waterMol * scale));

  for(let i=0;i<hCount;i++) items.push(["H⁺","hion"]);
  for(let i=0;i<ohCount;i++) items.push(["OH⁻","ohion"]);
  for(let i=0;i<acidIonCount;i++) items.push(["Aⁿ⁻","salt"]);
  for(let i=0;i<baseIonCount;i++) items.push(["Bⁿ⁺","salt"]);
  for(let i=0;i<waterCount;i++) items.push(["H₂O","water"]);

  items.forEach(item=>{
    const div = document.createElement("div");
    div.className = "ion " + item[1];
    div.textContent = item[0];

    const x = 8 + Math.random()*82;
    const y = 20 + Math.random()*63;

    div.style.left = x + "%";
    div.style.top = y + "%";

    box.appendChild(div);
  });
}

calculate();
</script>

</body>
</html>
